<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CodaCite</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card { border: 1px solid #ccc; padding: 1.5rem; margin-bottom: 2rem; border-radius: 8px; }
        input, button { padding: 0.5rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <h1>CodaCite</h1>

    <div class="card">
        <h2>1. Upload Document</h2>
        <form action="/ui/ingest" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required accept=".pdf,.txt,.md,.docx">
            <button type="submit">Ingest Document</button>
        </form>
        {% if ingest_message %}<p><strong>{{ ingest_message }}</strong></p>{% endif %}
    </div>

    <div class="card">
        <h2>2. Ask a Question</h2>
        <form action="/ui/query" method="get">
            <input type="text" name="q" placeholder="What is the document about?" required style="width: 70%;">
            <button type="submit">Search</button>
        </form>

        {% if results %}
            <h3>Results:</h3>
            <ul>
                {% for res in results %}
                    <li>{{ res.text }} (Score: {{ res.score }})</li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>
</body>
</html>
