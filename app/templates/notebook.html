<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Copilot | Notebook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar */
        aside {
            width: 300px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            flex-shrink: 0;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        #document-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .doc-item {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            background: var(--glass);
            margin-bottom: 0.5rem;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .doc-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .doc-icon {
            width: 20px;
            height: 20px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        /* Main Content */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
        }

        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-info h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
        }

        /* Chat Window */
        #chat-container {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0.25rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-bottom-left-radius: 0.25rem;
        }

        /* Input Area */
        .input-area {
            padding: 2rem;
            background: linear-gradient(to top, var(--bg-dark), transparent);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background: var(--bg-sidebar);
            border-radius: 1rem;
            border: 1px solid var(--border);
            padding: 0.5rem;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: border-color 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
        }

        #chat-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        #send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: var(--primary-hover);
        }

        #send-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        /* Loader */
        .typing-loader {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    </style>
</head>
<body>

    <aside>
        <div class="logo">Omni-Copilot</div>
        
        <div class="section-title">Sources</div>
        <ul id="document-list">
            <div style="color: var(--text-muted); font-size: 0.875rem; text-align: center; margin-top: 2rem;">
                Loading documents...
            </div>
        </ul>

        <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);">
            <div style="font-size: 0.75rem; color: var(--text-muted);">GraphRAG Powered</div>
        </div>
    </aside>

    <main>
        <header>
            <div class="header-info">
                <h2>Notebook Chat</h2>
            </div>
            <div class="header-actions">
                <button id="clear-btn" style="background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem;">Clear History</button>
            </div>
        </header>

        <div id="chat-container">
            <div class="message assistant">
                Hello! I'm your Omni-Copilot. Select a document from the sidebar or just start asking questions about your ingested knowledge.
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="chat-input" placeholder="Ask anything about your documents..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const documentList = document.getElementById('document-list');

        let chatHistory = [];

        // Fetch and display documents
        async function loadDocuments() {
            try {
                const response = await fetch('/api/v1/documents');
                const docs = await response.json();
                
                if (docs.length === 0) {
                    documentList.innerHTML = '<div style="color: var(--text-muted); font-size: 0.875rem; text-align: center; margin-top: 2rem;">No documents yet.</div>';
                    return;
                }

                documentList.innerHTML = docs.map(doc => `
                    <li class="doc-item">
                        <div class="doc-icon">
                            <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
                        </div>
                        ${doc.filename}
                    </li>
                `).join('');
            } catch (error) {
                console.error('Failed to load documents:', error);
                documentList.innerHTML = '<div style="color: red; font-size: 0.875rem; text-align: center; margin-top: 2rem;">Error loading sources.</div>';
            }
        }

        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerText = content;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendLoader() {
            const loaderDiv = document.createElement('div');
            loaderDiv.className = 'message assistant loader-msg';
            loaderDiv.innerHTML = `
                <div class="typing-loader">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            `;
            chatContainer.appendChild(loaderDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return loaderDiv;
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            chatInput.value = '';
            appendMessage('user', message);

            const loader = appendLoader();
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        history: chatHistory
                    })
                });

                const data = await response.json();
                
                // Remove loader
                loader.remove();
                
                appendMessage('assistant', data.response);

                // Update history
                chatHistory.push({ role: 'user', content: message });
                chatHistory.push({ role: 'assistant', content: data.response });

            } catch (error) {
                console.error('Chat error:', error);
                loader.remove();
                appendMessage('assistant', "I'm sorry, I couldn't reach the server. Please try again later.");
            } finally {
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        clearBtn.addEventListener('click', () => {
            chatHistory = [];
            chatContainer.innerHTML = `
                <div class="message assistant">
                    History cleared. How else can I help you today?
                </div>
            `;
        });

        // Initialize
        loadDocuments();
        chatInput.focus();

    </script>
</body>
</html>
