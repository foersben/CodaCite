<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodaCite | Intelligent Notebook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside>
        <div class="logo-container">
            <div class="logo-icon">
                <i data-lucide="brain-circuit"></i>
            </div>
            <div class="logo-text">CodaCite</div>
        </div>

        <div class="nav-section">
            <div class="section-header">
                <div class="section-label">Notebooks</div>
                <button class="btn-icon" id="add-notebook-btn" title="Create Notebook">
                    <i data-lucide="plus" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
            <div id="notebook-list">
                <!-- Notebooks rendered here -->
            </div>
        </div>

        <div class="nav-section" style="flex-grow: 1; overflow-y: auto;">
            <div class="section-header">
                <div class="section-label">Sources</div>
            </div>
            <div id="document-list">
                <!-- Documents rendered here -->
            </div>
        </div>

        <div id="drop-zone" class="glass-heavy" style="margin-top: auto; padding: 2rem; border-radius: 1.5rem; border: 2px dashed var(--border); text-align: center; cursor: pointer;">
            <i data-lucide="upload-cloud" style="color: var(--primary); margin-bottom: 0.75rem; width: 48px; height: 48px;"></i>
            <div style="font-size: 1rem; color: var(--text-muted);">Drop files to ingest</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main>
        <header>
            <div class="active-indicators" id="active-notebooks-bar">
                <!-- Active notebook badges here -->
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn-icon" id="db-view-btn" title="Database View">
                    <i data-lucide="database"></i>
                </button>
                <button class="btn-icon" id="clear-chat-btn" title="Clear Chat">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>
        </header>

        <div id="chat-container">
            <!-- Messages rendered here -->
            <div class="message assistant animate-in">
                <h3 style="margin-bottom: 0.5rem;">Welcome to CodaCite</h3>
                <p>Select or create a notebook in the sidebar to start your research. You can chat with specific collections or search across all your documents.</p>
            </div>
        </div>

        <!-- Split Pane Results -->
        <div id="results-pane" class="results-pane">
            <div class="pane-header">
                <div style="display: flex; align-items: center; gap: 0.75rem; font-size: 1.1rem; font-weight: 600;">
                    <i data-lucide="search" style="width: 24px; height: 24px; color: var(--primary);"></i>
                    Semantic Matches
                </div>
                <button class="btn-icon" id="close-results-btn">
                    <i data-lucide="chevron-down"></i>
                </button>
            </div>
            <div class="results-grid" id="results-grid">
                <!-- Search results cards here -->
            </div>
        </div>

        <div class="input-section">
            <div class="input-container">
                <input type="text" id="chat-input" placeholder="Ask a question or search your documents..." autocomplete="off">
                <button id="send-btn" class="btn-icon btn-primary" style="width: 36px; height: 36px; border-radius: 0.75rem; color: white;">
                    <i data-lucide="send"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- App Logic -->
    <script>
        // State
        let notebooks = [];
        let documents = [];
        let activeNotebookIds = new Set();
        let chatHistory = [];

        // Elements
        const notebookList = document.getElementById('notebook-list');
        const documentList = document.getElementById('document-list');
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const resultsPane = document.getElementById('results-pane');
        const resultsGrid = document.getElementById('results-grid');
        const activeBar = document.getElementById('active-notebooks-bar');

        // Init
        async function init() {
            await Promise.all([fetchNotebooks(), fetchDocuments()]);
            renderSidebar();
            lucide.createIcons();
        }

        async function fetchNotebooks() {
            try {
                const res = await fetch('/api/v1/notebooks');
                notebooks = await res.json();
            } catch (e) { console.error('Failed to fetch notebooks', e); }
        }

        async function fetchDocuments() {
            try {
                const res = await fetch('/api/v1/documents');
                documents = await res.json();
            } catch (e) { console.error('Failed to fetch documents', e); }
        }

        function renderSidebar() {
            // Render Notebooks
            notebookList.innerHTML = notebooks.map(nb => `
                <div class="notebook-item ${activeNotebookIds.has(nb.id) ? 'selected' : ''}" onclick="toggleNotebook('${nb.id}')">
                    <div class="notebook-checkbox">
                        ${activeNotebookIds.has(nb.id) ? '<i data-lucide="check" style="width: 12px; height: 12px; color: white;"></i>' : ''}
                    </div>
                    <div class="notebook-name">${nb.title}</div>
                </div>
            `).join('');

            // Filter Documents based on active notebooks
            // (In a real app, the API would filter, but for UX we can show which docs are "visible")
            documentList.innerHTML = documents.map(doc => `
                <div class="doc-item">
                    <i data-lucide="file-text" class="doc-icon"></i>
                    <div style="flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${doc.filename}</div>
                </div>
            `).join('');

            // Render active bar
            renderActiveBar();
            lucide.createIcons();
        }

        function renderActiveBar() {
            if (activeNotebookIds.size === 0) {
                activeBar.innerHTML = '<div class="badge"><div class="badge-dot"></div>All Knowledge</div>';
            } else {
                activeBar.innerHTML = Array.from(activeNotebookIds).map(id => {
                    const nb = notebooks.find(n => n.id === id);
                    return nb ? `<div class="badge"><div class="badge-dot"></div>${nb.title}</div>` : '';
                }).join('');
            }
        }

        function toggleNotebook(id) {
            if (activeNotebookIds.has(id)) {
                activeNotebookIds.delete(id);
            } else {
                activeNotebookIds.add(id);
            }
            renderSidebar();
        }

        async function createNotebook() {
            const title = prompt("Notebook Name:");
            if (!title) return;
            
            try {
                const res = await fetch('/api/v1/notebooks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ title, description: "New notebook" })
                });
                if (res.ok) {
                    await fetchNotebooks();
                    renderSidebar();
                }
            } catch (e) { alert("Failed to create notebook"); }
        }

        async function handleSend() {
            const query = chatInput.value.trim();
            if (!query) return;

            chatInput.value = '';
            appendMessage('user', query);
            
            const loader = appendLoader();
            
            // 1. Trigger Chat (Grounded Response)
            const chatPromise = fetch('/api/v1/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    query: query,
                    notebook_ids: Array.from(activeNotebookIds),
                    history: chatHistory
                })
            });

            // 2. Trigger Query (Raw Semantic Results)
            const queryPromise = fetch('/api/v1/query', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    query: query,
                    notebook_ids: Array.from(activeNotebookIds),
                    limit: 5
                })
            });

            try {
                const [chatRes, queryRes] = await Promise.all([chatPromise, queryPromise]);
                const chatData = await chatRes.json();
                const queryData = await queryRes.json();

                loader.remove();
                appendMessage('assistant', chatData.response);
                
                // Update History
                chatHistory.push({role: 'user', content: query});
                chatHistory.push({role: 'assistant', content: chatData.response});

                // Display Results Pane
                renderSearchResults(queryData.results || []);
            } catch (e) {
                loader.remove();
                appendMessage('assistant', "I encountered an error while processing your request.");
            }
        }

        function renderSearchResults(results) {
            if (results.length === 0) {
                resultsPane.classList.remove('open');
                return;
            }

            resultsGrid.innerHTML = results.map(res => `
                <div class="result-card animate-in">
                    <div style="font-size: 0.9rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 0.375rem;">
                        <i data-lucide="hash" style="width: 16px; height: 16px;"></i>
                        Match Score: ${Math.round((1 - res.distance) * 100)}%
                    </div>
                    <div class="result-text">${res.text}</div>
                    <div style="margin-top: auto; display: flex; justify-content: flex-end;">
                        <button class="btn-icon" style="font-size: 0.85rem; gap: 0.375rem; color: var(--primary);" onclick="addToActiveNotebooks('${res.document_id}')">
                            <i data-lucide="plus-circle" style="width: 20px; height: 20px;"></i> Add to Notebook
                        </button>
                    </div>
                </div>
            `).join('');
            
            resultsPane.classList.add('open');
            lucide.createIcons();
        }

        async function addToActiveNotebooks(docId) {
            if (activeNotebookIds.size === 0) {
                alert("Please select exactly one notebook to add this document to.");
                return;
            }
            const notebookId = Array.from(activeNotebookIds)[0];
            
            try {
                const res = await fetch(`/api/v1/notebooks/${notebookId}/documents/${docId}`, {
                    method: 'POST'
                });
                if (res.ok) {
                    alert("Added to notebook!");
                }
            } catch (e) { alert("Failed to add document"); }
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role} animate-in`;
            div.innerHTML = marked.parse(content);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendLoader() {
            const div = document.createElement('div');
            div.className = 'message assistant animate-in';
            div.innerHTML = '<div style="display: flex; gap: 4px;"><div class="badge-dot" style="animation: pulse 1s infinite;"></div> Thinking...</div>';
            chatContainer.appendChild(div);
            return div;
        }

        // Event Listeners
        sendBtn.onclick = handleSend;
        chatInput.onkeypress = (e) => e.key === 'Enter' && handleSend();
        document.getElementById('add-notebook-btn').onclick = createNotebook;
        document.getElementById('close-results-btn').onclick = () => resultsPane.classList.remove('open');
        document.getElementById('clear-chat-btn').onclick = () => {
            chatHistory = [];
            chatContainer.innerHTML = '';
        };

        // File Ingestion logic (Existing)
        const dropZone = document.getElementById('drop-zone');
        dropZone.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = async () => {
                if (input.files.length) await uploadFile(input.files[0]);
            };
            input.click();
        };

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            // If a notebook is selected, automatically add to it after ingestion
            const targetNotebookId = activeNotebookIds.size === 1 ? Array.from(activeNotebookIds)[0] : null;
            if (targetNotebookId) {
                formData.append('notebook_id', targetNotebookId);
            }

            try {
                const res = await fetch('/api/v1/ingest', { method: 'POST', body: formData });
                if (res.ok) {
                    await fetchDocuments();
                    renderSidebar();
                    appendMessage('assistant', `Document **${file.name}** has been ingested.`);
                }
            } catch (e) { alert("Ingestion failed"); }
        }

        init();
    </script>
</body>
</html>
