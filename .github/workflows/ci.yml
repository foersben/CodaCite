name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SurrealDB
        run: |
          podman run -d --name surrealdb -p 8000:8000 \
            docker.io/surrealdb/surrealdb:latest \
            start --user root --pass root memory

          # Wait for SurrealDB to be ready
          for i in {1..20}; do
            if podman exec surrealdb /surreal isready --endpoint http://localhost:8000; then
              echo "SurrealDB is ready"
              exit 0
            fi
            echo "Waiting for SurrealDB..."
            sleep 2
          done
          echo "SurrealDB failed to start"
          podman logs surrealdb
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with Ruff
        run: uv run ruff check app/ tests/

      - name: Type check with Mypy
        run: uv run mypy app/

      - name: Run tests with coverage
        run: uv run pytest --cov=app tests/ --cov-report=xml
        env:
          SURREALDB_URL: ws://localhost:8000
          SURREALDB_USER: root
          SURREALDB_PASS: root

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml

  binaries:
    name: Build Binary (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Clean Build
        shell: bash
        run: rm -rf build dist

      - name: Fix OpenVINO signatures (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          find .venv -name "*.dylib" -path "*/openvino/*" -exec codesign --remove-signature {} \;

      - name: Build with PyInstaller
        run: uv run pyinstaller codacite.spec
        env:
          PYINSTALLER_CONFIG_DIR: ${{ github.workspace }}/.pyinstaller_config

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codacite-${{ matrix.os }}
          path: dist/*

  docker:
    name: Build & Publish Container
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docs:
    name: Deploy Documentation
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build Docs
        run: uv run zensical build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
