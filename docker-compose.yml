version: "3.9"

services:
  surrealdb:
    image: docker.io/surrealdb/surrealdb:v3.0.5
    container_name: surrealdb
    ports:
      - "8000:8000"
    command: >
      start
      --log info
      --user root
      --pass root
      surrealkv://var/lib/surrealdb
    volumes:
      - surreal_data:/var/lib/surrealdb
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codacite
    ports:
      - "8080:8080"
    environment:
      - SURREALDB_URL=ws://surrealdb:8000
      - SURREALDB_USER=root
      - SURREALDB_PASS=root
      - SURREALDB_NS=codacite
      - SURREALDB_DB=production
      - MODELS_DIR=/app/models
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./models:/app/models:ro
      - blob_data:/app/uploads
    depends_on:
      surrealdb:
        condition: service_healthy

volumes:
  surreal_data:
  blob_data:
