services:
  surrealdb:
    image: docker.io/surrealdb/surrealdb:v3.0.5
    container_name: surrealdb
    ports:
      - "8000:8000"
    command: >
      start
      --log trace
      --user root
      --pass root
      memory
    volumes:
      - ./surreal_data:/var/lib/surrealdb
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codacite
    ports:
      - "8080:8080"
    environment:
      - SURREALDB_URL=ws://surrealdb:8000
      - SURREALDB_USER=root
      - SURREALDB_PASS=root
      - SURREALDB_NS=codacite
      - SURREALDB_DB=production
      - MODELS_DIR=/app/models
      - UPLOAD_DIR=/app/uploads
      - UV_CACHE_DIR=/app/.uv_cache
      - UV_PYTHON_INSTALL_DIR=/app/.uv_python
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - USE_LOCAL_NLP_MODELS=${USE_LOCAL_NLP_MODELS:-true}
      - LOCAL_LLM_PATH=${LOCAL_LLM_PATH}
    volumes:
      - ./app:/app/app:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./uv.lock:/app/uv.lock:ro
      - ./.uv_cache:/app/.uv_cache
      - ./.uv_python:/app/.uv_python
      - ./models:/app/models
      - ./blob_data:/app/uploads
      - ./logs:/app/logs
    depends_on:
      surrealdb:
        condition: service_healthy
